<!DOCTYPE html>
<html>
<head>
    <title>StillGrowing Pro - Control Deck</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <style>
        :root { --primary: #5be1d7; --bg: #0a0a0a; --card: #161616; --text: #f0f0f0; --accent: #2a2a2a; --red: #ff5252; --green: #4caf50; --gold: #ffcc00; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 50px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; }
        .card h2 { margin: 0 0 10px; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .stat { background: var(--accent); padding: 10px; border-radius: 8px; text-align: center; }
        .stat-val { font-size: 18px; font-weight: bold; color: var(--primary); }
        .stat-label { font-size: 9px; color: #666; margin-top: 3px; }
        .btn { border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; background: #333; color: white; font-size: 12px; transition: 0.2s; }
        .btn:active { opacity: 0.7; transform: scale(0.98); }
        .btn.primary { background: var(--primary); color: #000; }
        .btn.danger { background: var(--red); color: #fff; }
        .btn.success { background: var(--green); color: #fff; }
        .btn.gold { background: var(--gold); color: #000; }
        #consoleLog { font-size:10px; color:#0f0; background:rgba(0,0,0,0.9); padding:10px; height:180px; overflow-y:auto; border-radius:8px; font-family: monospace; border: 1px solid #333; margin-top:10px; }
        .flex-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        .label { font-size: 11px; color: #888; min-width: 80px; }
        #qrcode { background: white; padding: 10px; border-radius: 8px; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>

    <div style="margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;">
        <h1 style="margin:0; font-size:20px;">StillGrowing <span style="color:var(--primary)">Pro</span></h1>
        <select id="deviceSelector" onchange="switchDevice()" style="width:auto; padding:5px; background:var(--primary); color:#000; font-weight:bold; border-radius:5px;"></select>
    </div>

    <div class="stat-grid">
        <div class="stat"><div class="stat-val" id="temp">--</div><div class="stat-label">TEMP</div></div>
        <div class="stat"><div class="stat-val" id="humidity">--</div><div class="stat-label">RH%</div></div>
        <div class="stat"><div class="stat-val" id="water">--</div><div class="stat-label">WATER</div></div>
        <div class="stat"><div class="stat-val" id="fanStat">--</div><div class="stat-label">RPM</div></div>
    </div>

    <div class="card">
        <h2>💡 Master Light Control</h2>
        <div class="grid">
            <button class="btn success" onclick="setDayMode()">☀️ FULL LIGHTS ON</button>
            <button class="btn danger" onclick="setNightMode()">🌙 FULL LIGHTS OFF</button>
        </div>
        <div style="margin-top:10px;">
            <button class="btn primary" style="width:100%;" onclick="setPhase('veg')">🌱 VEGETATIVE (Cold White)</button>
            <button class="btn gold" style="width:100%; margin-top:5px;" onclick="setPhase('flower')">🌸 FLOWERING (Warm White)</button>
        </div>
    </div>

    <div class="card">
        <h2>📅 Schedule Setup</h2>
        <div class="flex-row">
            <span class="label">SUNRISE:</span>
            <input type="time" id="sunriseTime" value="06:00" onchange="updateSchedule()">
        </div>
        <div class="flex-row">
            <span class="label">SUNSET:</span>
            <input type="time" id="sunsetTime" value="22:00" onchange="updateSchedule()">
        </div>
    </div>

    <div class="card">
        <h2>🌈 Accent LEDs & Glass</h2>
        <div class="grid" style="margin-bottom:10px;">
            <button class="btn" onclick="cmd('setEglass', '1')">Clear Glass</button>
            <button class="btn" onclick="cmd('setEglass', '0')">Fog Glass</button>
        </div>
        <div style="display:flex; gap:5px; margin-bottom:10px;">
            <input type="color" id="accentPicker" value="#00FF00" style="flex:1; height:40px; border:none; background:none;">
            <button class="btn primary" style="flex:1;" onclick="applyAccent('11')">All</button>
            <button class="btn" style="flex:1;" onclick="applyAccent('15')">Front</button>
            <button class="btn" style="flex:1;" onclick="applyAccent('10')">Top</button>
        </div>
    </div>

    <div class="card" style="text-align:center;">
        <h2>📱 Mobile Access</h2>
        <canvas id="qrcode"></canvas>
        <p style="font-size:9px; color:#666; margin-top:5px;">Scan to open on your phone.</p>
    </div>

    <div id="consoleLog">Ready.</div>

    <script src="qrious.min.js"></script>
    <script>
        let currentDeviceId = "";
        let currentPhase = "veg";
        
        const GOLDEN_RECIPE = {
            "cycle_id": "GROWTHCYCLE_SHADOW",
            "PhaseMinDur": 7, "PhaseMaxDur": 14, "BT_FADE_TIME": 30,
            "AC_Temp_Day": 25, "AC_Temp_Night": 18, "Airflow": 100,
            "PUMP_ON_RATIO": 50, "Passing_Plt_Ht": 10, "Sunrise_T": 0, "Sunset_T": 86400
        };

        function log(msg) {
            const el = document.getElementById('consoleLog');
            const now = new Date().toLocaleTimeString();
            el.innerHTML = `<div>[${now}] ${msg}</div>` + el.innerHTML;
        }

        async function init() {
            const config = await (await fetch('/config')).json();
            if (config.devices && config.devices.length > 0) {
                const selector = document.getElementById('deviceSelector');
                selector.innerHTML = config.devices.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
                currentDeviceId = selector.value;
                
                if (config.automation) {
                    document.getElementById('sunriseTime').value = config.automation.startTime || "06:00";
                    document.getElementById('sunsetTime').value = config.automation.endTime || "22:00";
                    currentPhase = config.automation.manualPhase || "veg";
                }
                
                new QRious({
                    element: document.getElementById('qrcode'),
                    value: `http://${config.localIp}:${config.port}/`,
                    size: 150
                });

                refreshStats();
            }
        }

        async function setDayMode() {
            log("☀️ FORCING DAY MODE...");
            const recipe = { ...GOLDEN_RECIPE, "Cold_LED_BT": "FFFFFF", "Warm_LED_BT": "FFFFFF" };
            await cmd('updPhzInfo', JSON.stringify(recipe));
            await cmd('goToPhzNum', '1');
            await cmd('setSysMode', 'Growing');
            await cmd('setGrowLED', '111111,100');
            await cmd('setEglass', '1');
        }

        async function setNightMode() {
            log("🌙 FORCING NIGHT MODE...");
            const recipe = { ...GOLDEN_RECIPE, "Cold_LED_BT": "000000", "Warm_LED_BT": "000000" };
            await cmd('updPhzInfo', JSON.stringify(recipe));
            await cmd('goToPhzNum', '4');
            await cmd('setSysMode', '0');
            await cmd('setGrowLED', '111111,0');
        }

        async function setPhase(phase) {
            currentPhase = phase;
            log(`Switching Spectrum to ${phase.toUpperCase()}...`);
            const cold = (phase === 'veg') ? "FFFFFF" : "000000";
            const warm = (phase === 'flower') ? "FFFFFF" : "000000";
            const recipe = { ...GOLDEN_RECIPE, "Cold_LED_BT": cold, "Warm_LED_BT": warm };
            
            await cmd('updPhzInfo', JSON.stringify(recipe));
            await cmd('goToPhzNum', (phase === 'flower' ? '2' : '1'));
            await cmd('setSysMode', 'Growing');
            await cmd('setGrowLED', '111111,100');
        }

        async function updateSchedule() {
            const startTime = document.getElementById('sunriseTime').value;
            const endTime = document.getElementById('sunsetTime').value;
            log(`Saving Schedule: ${startTime} - ${endTime}`);
            await fetch('/api/schedule', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ startTime, endTime })
            });
        }

        function switchDevice() {
            currentDeviceId = document.getElementById('deviceSelector').value;
            refreshStats();
        }

        async function refreshStats() {
            if (!currentDeviceId) return;
            try {
                const r = await fetch(`/api/dashboard/${currentDeviceId}/status`);
                const d = await r.json();
                document.getElementById('temp').innerText = d.cTemp ? d.cTemp.toFixed(1) : '--';
                document.getElementById('humidity').innerText = d.cRH ? d.cRH.toFixed(0) : '--';
                document.getElementById('water').innerText = d.wLvl || '--';
                document.getElementById('fanStat').innerText = d.vFan || '0';
            } catch(e) { }
        }

        async function cmd(func, args) {
            if (!func) return;
            log(`SENDING: ${func}`);
            try {
                const res = await fetch(`/api/dashboard/${currentDeviceId}/command`, { 
                    method:'POST', 
                    headers:{'Content-Type':'application/json'}, 
                    body:JSON.stringify({functionName:func, args: args.toString()}) 
                });
                const data = await res.json();
                log(`RES: ${data.return_value}`);
            } catch (e) { log(`ERR: ${e.message}`); }
        }

        function applyAccent(mask) {
            const hex = document.getElementById('accentPicker').value;
            const r = parseInt(hex.slice(1, 3), 16).toString(16).toUpperCase().padStart(2, '0');
            const g = parseInt(hex.slice(3, 5), 16).toString(16).toUpperCase().padStart(2, '0');
            const b = parseInt(hex.slice(5, 7), 16).toString(16).toUpperCase().padStart(2, '0');
            cmd('setRGB', `${mask},${r},${g},${b}`);
        }

        init();
        setInterval(refreshStats, 3000);
    </script>
</body>
</html>
